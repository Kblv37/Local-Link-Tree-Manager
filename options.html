<!-- options.html -->
<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Дерево ссылок — Настройки</title>
    <link rel="stylesheet" href="options.css">
</head>

<body>
    <div class="container">
        <div class="topbar">
            <div class="controls">
                <button id="addRoot" class="btn">+📁</button>
                <button id="saveBtn" class="btn">Сохранить</button>
                <button id="cancelBtn" class="btn small">Отмена</button>

                <div class="export-group">
                    <button id="exportBtn" class="btn small">Экспорт</button>
                    <label class="export-mode-label" title="Добавить дату к имени файла вместо перезаписи">
                        <input type="checkbox" id="exportUnique" />
                        уник. имя
                    </label>
                </div>

                <label for="importFile" class="btn small" title="Импорт TXT">Импорт</label>
                <input id="importFile" type="file" accept=".txt,text/plain" style="display:none" />

                <button id="sortBtn" class="btn small">A→Я</button>
                <button id="cleanBtn" class="btn small">Очистить пустые</button>
                <button id="undoBtn" class="btn small">Отменить</button>
            </div>

            <div class="search" role="search" style="margin-left:10px">
                <svg width="14" height="14" viewBox="0 0 24 24" style="opacity:.6">
                    <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" />
                </svg>
                <input id="search" placeholder="Поиск папок и ссылок (Enter)" />
                <button id="clearSearch" class="btn small">✖</button>
            </div>

            <div class="meta">
                <span id="unsavedIndicator" style="display:none" class="unsaved">
                    Есть несохранённые изменения
                </span>
            </div>
        </div>

        <div class="panel compact">
            <div id="tree" aria-live="polite"></div>

            <div class="status">
                <div class="footer">
                    Данные хранятся локально. Нажмите «Сохранить», чтобы применить изменения.
                </div>
            </div>
        </div>
    </div>

    <script src="options.js"></script>
</body>

</html>
