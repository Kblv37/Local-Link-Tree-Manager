<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>LLTM</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="panel">
        <div class="head-row1">
            <div class="head-brand">
                <svg class="app-logo" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                <span class="app-title" data-i18n="appTitle">LLTM</span>
            </div>
            <div class="head-actions">
                <button id="savePageBtn" class="head-btn head-btn-primary" data-i18n-title="savePage">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    <span class="head-btn-label" data-i18n="savePage">Save page</span>
                </button>
                <button id="saveTabsBtn" class="head-btn" data-i18n-title="saveTabs" style="display:none">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
                </button>
                <button id="toggleAll" class="head-btn head-btn-icon" data-i18n-title="collapseAll">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="21" y2="3"/><line x1="3" y1="21" x2="14" y2="10"/></svg>
                </button>
                <button id="openOptions" class="head-btn head-btn-icon" data-i18n-title="settings">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
            </div>
        </div>
        <div class="head-row2">
            <div class="search-wrap">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input id="popupSearch" data-i18n-placeholder="search" placeholder="Search…" autocomplete="off" spellcheck="false" />
            </div>
        </div>

        <div id="tree"></div>

        <div id="descPanel" class="desc-panel" style="display:none"></div>
    </div>

    <div id="savePageOverlay" class="sp-overlay" style="display:none">
        <div class="sp-modal">
            <div class="sp-header">
                <span id="savePageTitle" class="sp-title" data-i18n="savePageTitle">Save current page</span>
                <button id="savePageCancelBtn" class="sp-cancel-btn" data-i18n="savePageCancel">Cancel</button>
            </div>
            <div class="sp-title-row">
                <label class="sp-label-inline" data-i18n="savePageTitleLabel">Title</label>
                <input id="savePageTitleInput" class="sp-title-input" data-i18n-placeholder="savePageTitlePh" placeholder="Page title…" />
            </div>
            <div id="savePageToLabel" class="sp-label" data-i18n="savePageTo">Save to folder:</div>
            <div id="savePageFolderList" class="sp-folder-list"></div>
            <div class="sp-footer">
                <button id="savePageConfirm" class="sp-confirm-btn" data-i18n="savePageSave">Save</button>
            </div>
        </div>
    </div>

    <script type="module" src="popup.js"></script>
</body>
</html>
