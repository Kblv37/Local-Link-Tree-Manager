<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <title>Дерево ссылок</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="panel">
        <div class="head">
            <div class="title">Дерево🔗</div>
            <div class="search" title="Поиск (Esc — очистить)">
                <input id="popupSearch" placeholder="Поиск…" autocomplete="off" />
            </div>
            <button id="toggleAll" class="icon-btn" title="Свернуть / Развернуть всё">⊞</button>
            <button id="openOptions" class="icon-btn" title="Настройки">⚙</button>
        </div>
        <div id="tree"></div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
