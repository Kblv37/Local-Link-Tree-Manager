<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>LLTM Search</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="search.css">
</head>
<body>
    <div class="search-panel">
        <div class="search-header">
            <span class="search-logo">LLTM</span>
            <div class="search-input-wrap">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input id="searchInput" type="text" placeholder="Search links… (.. for deep search)" autocomplete="off" spellcheck="false" />
            </div>
            <div class="search-hint">
                <kbd>↑↓</kbd> navigate &nbsp;
                <kbd>Enter</kbd> new tab &nbsp;
                <kbd>Shift+Enter</kbd> current tab &nbsp;
                <kbd>Esc</kbd> close
            </div>
        </div>
        <div id="results" class="results-list"></div>
    </div>
    <script type="module" src="search.js"></script>
</body>
</html>
